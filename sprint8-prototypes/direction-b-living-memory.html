<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390" />
  <title>Direction B — Living Memory</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .content { padding: 20px 20px 36px; }
    .eyebrow { font-size: 12px; color: rgba(154,154,144,0.7); }
    .title {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .count { margin-top: 6px; font-size: 13px; color: #9a9a90; }
    .thread-block {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 20px;
      background: rgba(255,224,51,0.12);
      ring: 1px solid rgba(255,224,51,0.2);
      border: 1px solid rgba(255,224,51,0.18);
    }
    .thread-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(17,17,17,0.45);
    }
    .thread-title {
      margin-top: 6px;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
    }
    .thread-sub {
      margin-top: 4px;
      font-size: 13px;
      color: rgba(154,154,144,0.85);
    }
    .flow {
      margin-top: 20px;
      position: relative;
      padding-left: 14px;
    }
    .flow::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: linear-gradient(180deg, #ffe033 0%, rgba(255,224,51,0.15) 100%);
      border-radius: 2px;
    }
    .node {
      position: relative;
      margin-bottom: 14px;
      padding: 14px 16px 14px 18px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid rgba(0,0,0,0.05);
    }
    .node::before {
      content: "";
      position: absolute;
      left: -14px;
      top: 20px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffe033;
      border: 2px solid #fff;
    }
    .node.warm { background: rgba(255,224,51,0.08); }
    .node-date { font-size: 11px; color: rgba(154,154,144,0.65); }
    .node-title {
      margin-top: 5px;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
    }
    .node-body {
      margin-top: 4px;
      font-size: 13px;
      color: #9a9a90;
      line-height: 1.55;
    }
    .pulse-hint {
      margin-top: 16px;
      font-size: 12px;
      color: rgba(154,154,144,0.6);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="phone">
    <span class="badge-proto">B · Living Memory</span>
    <div class="nav">
      <div class="logo">ITJIMA<span>·</span></div>
      <div style="font-size:12px;color:#9a9a90">한국어</div>
    </div>
    <div class="tabs">
      <div class="tab">생각</div>
      <div class="tab">그때</div>
      <div class="tab on">기억함</div>
    </div>
    <div class="content">
      <p class="eyebrow">잊어도 돼요.</p>
      <h1 class="title">여기 있어요.</h1>
      <p class="count">생각들이 이어지고 있어요</p>
      <div class="thread-block">
        <p class="thread-label">이어지는 생각</p>
        <p class="thread-title">준비와 기다림</p>
        <p class="thread-sub">엄마 생일 · 독일 유학 — 2개</p>
      </div>
      <div class="flow">
        <article class="node warm">
          <p class="node-date">방금 떠올림</p>
          <h2 class="node-title">엄마 생일 준비</h2>
          <p class="node-body">꽃도 사고 케이크도 예약해야지</p>
        </article>
        <article class="node">
          <p class="node-date">7월 5일</p>
          <h2 class="node-title">독일 유학 비자</h2>
          <p class="node-body">준비 어떻게 하지?</p>
        </article>
        <article class="node">
          <p class="node-date">6월 28일</p>
          <h2 class="node-title">홍대 카페</h2>
          <p class="node-body">분위기 좋았던 곳</p>
        </article>
        <article class="node">
          <p class="node-date">6월 12일</p>
          <h2 class="node-title">읽다 만 책</h2>
          <p class="node-body">다시 이어 읽기</p>
        </article>
      </div>
      <p class="pulse-hint">기억은 조용히 이어져요</p>
    </div>
  </div>
</body>
</html>
