<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390" />
  <title>Direction A — Quiet Memory</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .content { padding: 28px 24px 40px; }
    .eyebrow {
      font-size: 12px;
      font-weight: 500;
      color: rgba(154,154,144,0.75);
      letter-spacing: 0.02em;
    }
    .title {
      margin-top: 6px;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }
    .count {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(154,154,144,0.8);
      line-height: 1.5;
    }
    .search {
      margin-top: 22px;
      width: 100%;
      border: 0;
      background: rgba(0,0,0,0.035);
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 14px;
      color: rgba(154,154,144,0.7);
    }
    .memory {
      margin-top: 28px;
      padding-bottom: 22px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .memory:last-child { border-bottom: 0; }
    .memory-date {
      font-size: 11px;
      font-weight: 500;
      color: rgba(154,154,144,0.55);
      letter-spacing: 0.04em;
    }
    .memory-title {
      margin-top: 8px;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.45;
      letter-spacing: -0.02em;
      color: #111111;
    }
    .memory-body {
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(154,154,144,0.85);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .group-whisper {
      margin-top: 36px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(154,154,144,0.45);
    }
    .footer-hint {
      margin-top: 48px;
      text-align: center;
      font-size: 12px;
      color: rgba(154,154,144,0.5);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="phone">
    <span class="badge-proto">A · Quiet Memory</span>
    <div class="nav">
      <div class="logo">ITJIMA<span>·</span></div>
      <div style="font-size:12px;color:#9a9a90">한국어</div>
    </div>
    <div class="tabs">
      <div class="tab">생각</div>
      <div class="tab">그때</div>
      <div class="tab on">기억함</div>
    </div>
    <div class="content">
      <p class="eyebrow">잊어도 돼요.</p>
      <h1 class="title">여기 있어요.</h1>
      <p class="count">4개의 생각이 조용히 기다리고 있어요</p>
      <input class="search" readonly value="떠올리고 싶은 걸 찾아보세요" />
      <article class="memory">
        <p class="memory-date">7월 8일</p>
        <h2 class="memory-title">엄마 생일 준비</h2>
        <p class="memory-body">엄마 생일인데 꽃도 사고 케이크도 예약해야지</p>
      </article>
      <article class="memory">
        <p class="memory-date">7월 5일</p>
        <h2 class="memory-title">독일 유학 비자</h2>
        <p class="memory-body">독일 유학 비자 준비 어떻게 하지?</p>
      </article>
      <article class="memory">
        <p class="memory-date">6월 28일</p>
        <h2 class="memory-title">홍대 카페</h2>
        <p class="memory-body">분위기 좋았던 카페, 창가 자리 기억</p>
      </article>
      <p class="group-whisper">나중에 · 아이디어 · 장소</p>
      <p class="footer-hint">탭하면 펼쳐져요.<br />서두르지 않아도 돼요.</p>
    </div>
  </div>
</body>
</html>
